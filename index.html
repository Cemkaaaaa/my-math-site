<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная - Математика</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f7fa;
            color: #1a2a3a;
        }
        h1 {
            color: #2c3e66;
            text-align: center;
            border-bottom: 3px solid #4a6fa5;
            padding-bottom: 10px;
        }
        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 30px 0;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            min-width: 180px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            text-align: center;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card a {
            text-decoration: none;
            font-size: 1.4em;
            font-weight: bold;
            color: #2c3e66;
            display: block;
            margin: 10px 0;
        }
        .card p {
            color: #4a5568;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #718096;
        }
    </style>
</head>
<body>
    <h1>📐 Мир математики</h1>
    <p style="text-align:center; font-size:1.2em">Выберите раздел, который хотите изучить:</p>

    <div class="card-container">
        <div class="card">
            <span style="font-size:3em">✖️</span>
            <a href="algebra.html">Алгебра</a>
            <p>Уравнения, функции, переменные</p>
        </div>
        <div class="card">
            <span style="font-size:3em">📐</span>
            <a href="geometry.html">Геометрия</a>
            <p>Фигуры, углы, пространство</p>
        </div>
        <div class="card">
            <span style="font-size:3em">🔢</span>
            <a href="arithmetic.html">Арифметика</a>
            <p>Числа, дроби, основные действия</p>
        </div>
        <div class="card">
            <span style="font-size:3em">📝</span>
            <a href="test.html">Тест</a>
            <p>Проверь свои знания</p>
        </div>
    </div>
</body>
</html>
